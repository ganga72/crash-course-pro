name: triggering events

on: 
  push:
    branches:
      - "example-branch/*"
  pull_request:
    types: 
      - opened
      - synchronize
      - reopened
    paths:
      - "03-core-features/filters/*.md"
      - "! 03-core-features/filters/*.txt"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:   

jobs:
  echo-event:
    runs-on: ubuntu-22.04
    steps:
      - name: Dump full event json
        run: |
            echo "... $GITHUB-EVENT-NAME payload ..."
            cat "$GITHUB-EVENT-PATH"
