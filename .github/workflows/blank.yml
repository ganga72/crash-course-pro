name: :workflow, jbs, and steps

on: 
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-22.04
    steps:
      - run: echo "A job consits"
      - run: echo "on or more steps"
      - run: echo "which run sequentially"
      - run: echo "within the same compile environment"
  job-2:
    runs-on: ubuntu-22.04
    steps:
      - run: echo "multiple jobs can run in parallel"
  job-3:
    runs-on: ubuntu-22.04
    needs:
    - job-1
    - job-2
    steps:
      - run: echo "they can also depend on the another..."
  job-4:
    runs-on: ubuntu-22.04
    needs:
    - job-2
    - job-3
    steps:
      - run: echo "... to form a directed a cyclic graph (DAG)"
